name: "Terraform CI/CD"

# Runs on PRs for plan preview, runs on merge to main for apply.
# Only triggers when Terraform files actually change.
on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

env:
  PROJECT_ID:  sara-sandbox-interns
  REGION:      europe-west3
  ZONE:        europe-west3-a
  VPC_NAME:    vprofile-vpc
  SUBNET_CIDR: "172.20.1.0/24"
  DOMAIN:      srajer.xyz

jobs:

  # ─────────────────────────────────────────────────────────────────
  # On every PR — runs plan and posts the output as a PR comment
  # so reviewers can see exactly what will change before approving.
  # ─────────────────────────────────────────────────────────────────
  plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      id-token: write        # Required for Workload Identity Federation
      pull-requests: write   # Required to post plan as a PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — no key files)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Terraform Plan
        id: plan
        # Pass all variables via TF_VAR_* — no tfvars file needed in CI
        env:
          TF_VAR_project_id:  ${{ env.PROJECT_ID }}
          TF_VAR_region:      ${{ env.REGION }}
          TF_VAR_zone:        ${{ env.ZONE }}
          TF_VAR_vpc_name:    ${{ env.VPC_NAME }}
          TF_VAR_subnet_cidr: ${{ env.SUBNET_CIDR }}
          TF_VAR_domain:      ${{ env.DOMAIN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          # image_id not set here — defaults to ubuntu base (infrastructure plan only)
        run: |
          terraform -chdir=terraform plan -no-color 2>&1 | tee /tmp/plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            const body = [
              '## 📋 Terraform Plan',
              '',
              '```hcl',
              truncated,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────
  # On merge to main — applies infrastructure changes
  # ─────────────────────────────────────────────────────────────────
  apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF — no key files)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Terraform Apply
        env:
          TF_VAR_project_id:  ${{ env.PROJECT_ID }}
          TF_VAR_region:      ${{ env.REGION }}
          TF_VAR_zone:        ${{ env.ZONE }}
          TF_VAR_vpc_name:    ${{ env.VPC_NAME }}
          TF_VAR_subnet_cidr: ${{ env.SUBNET_CIDR }}
          TF_VAR_domain:      ${{ env.DOMAIN }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          # image_id not set — Terraform keeps whatever image is in state
          # (image updates are handled exclusively by the deploy.yml workflow)
        run: terraform -chdir=terraform apply -auto-approve
