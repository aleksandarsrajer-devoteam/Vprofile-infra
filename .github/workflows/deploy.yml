name: "Deploy — Bake Image & Rolling Update"

# Triggered by the Vprofile-app repo after it builds and uploads the WAR to GCS.
# Payload contains: git_sha, gcs_war_path
on:
  repository_dispatch:
    types: [deploy]

env:
  PROJECT_ID:  sara-sandbox-interns
  REGION:      europe-west3
  ZONE:        europe-west3-a
  VPC_NAME:    vprofile-vpc
  SUBNET_CIDR: "172.20.1.0/24"
  DOMAIN:      srajer.xyz
  MIG_NAME:    vprofile-tomcat-mig
  # Full self_link of the private subnet — used by Packer to build inside the VPC
  SUBNET_SELF_LINK: "projects/sara-sandbox-interns/regions/europe-west3/subnetworks/vprofile-vpc-private-subnet"

jobs:
  bake-and-deploy:
    name: "Bake Image & Deploy"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout infra repo (Packer templates + Ansible roles live here)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_infra_branch || 'main' }}

      - name: Authenticate to GCP (WIF — no key files)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── Step 1: Download the WAR from GCS ──────────────────────────────────
      # The Vprofile-app pipeline built and uploaded this WAR.
      # We just need to download it to this runner before passing it to Packer.
      - name: Download WAR from GCS
        run: |
          GCS_PATH="${{ github.event.client_payload.gcs_war_path }}"
          echo "Downloading WAR from: ${GCS_PATH}"
          gcloud storage cp "${GCS_PATH}" ./vprofile-v2.war
          ls -lh ./vprofile-v2.war
      
