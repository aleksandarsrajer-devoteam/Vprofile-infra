name: "Deploy — App Rolling Update (via Repository Dispatch)"

on:
  repository_dispatch:
    types: [deploy]

env:
  PROJECT_ID:  sara-sandbox-interns
  REGION:      europe-west3
  MIG_NAME:    vprofile-tomcat-mig
  # Ovo je fiksna putanja koju tvoja tomcat_init.sh skripta na Cloudu uvek traži na boot-u
  FINAL_GCS_WAR: "gs://vprofile-build-artifacts/vprofile-latest.war"

jobs:
  deploy-app:
    name: "Promote WAR & Restart MIG"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Potrebno za Workload Identity Federation

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.target_infra_branch || 'main' }}

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ── Korak 1: Uzimamo novi .war iz payload-a i prelepljujemo "latest" na bucketu ──
      # Developerov pipeline ti šalje tačnu GCS putanju gde je tek kompajliran .war (npr. sa tagom ili SHA)
      # Mi taj fajl samo kopiramo na našu glavnu lokaciju koju mašine čitaju.
      - name: Promote new WAR to Latest
        run: |
          SRC_WAR="${{ github.event.client_payload.gcs_war_path }}"
          GIT_SHA="${{ github.event.client_payload.git_sha }}"
          
          echo "Processing deploy for commit: ${GIT_SHA}"
          echo "Promoting new build from ${SRC_WAR} to ${{ env.FINAL_GCS_WAR }}"
          
          gcloud storage cp "${SRC_WAR}" "${{ env.FINAL_GCS_WAR }}"
          echo "✅ Novi .war je uspešno postavljen kao podrazumevani!"

      # ── Korak 2: Naređujemo MIG-u da uradi rolling REPLACE (Zero-Downtime) ──
      # Koristimo 'replace' umesto 'restart' jer 'replace' dozvoljava --max-surge.
      # Na ovaj način Google prvo pali novu mašinu (surge=1), ona povlači novi .war,
      # i tek kad postane zdrava, Google ubija staru mašinu.
      - name: Trigger Rolling Replace on MIG
        run: |
          echo "Naređujem MIG-u '${{ env.MIG_NAME }}' da bezbedno zameni mašine..."
          gcloud compute instance-groups managed rolling-action replace ${{ env.MIG_NAME }} \
            --region=${{ env.REGION }} \
            --max-surge=3 \
            --max-unavailable=0

      # ── Korak 3: Čekamo da se sve mašine uspešno podignu i povuku kod ──
      - name: Wait for MIG to stabilize
        run: |
          echo "Čekam da nove mašine prođu Health Check-ove sa novim kodom..."
          gcloud compute instance-groups managed wait-until ${{ env.MIG_NAME }} \
            --region=${{ env.REGION }} \
            --stable \
            --timeout=400

          echo "✅ Nova verzija aplikacije je uspešno puštena bez sekunde downtime-a!"
          gcloud compute instance-groups managed list-instances ${{ env.MIG_NAME }} \
            --region=${{ env.REGION }} \
            --format="table(name,status,currentAction,version.instanceTemplate)"